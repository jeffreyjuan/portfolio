<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Way'z Admin — Rides</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="wz-admin-layout">
  <aside class="wz-admin-sidebar">
    <div class="logo-area"><div class="wz-logo"><span>way'z</span></div><small>Admin Panel</small></div>
    <nav class="wz-admin-nav">
      <a href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
      <a href="users.html"><span class="icon">👥</span> Users</a>
      <a href="drivers.html"><span class="icon">🚘</span> Drivers</a>
      <a href="rides.html" class="active"><span class="icon">🗺️</span> Rides</a>
      <a href="settings.html"><span class="icon">⚙️</span> Settings</a>
      <div class="spacer"></div>
      <a href="../index.html"><span class="icon">🏠</span> Back to Site</a>
    </nav>
    <div class="wz-sidebar-footer"><div class="wz-admin-user"><div class="wz-avatar" style="width:32px;height:32px;font-size:11px;">AD</div><div><div style="font-weight:500;font-size:var(--wz-text-sm);">Admin</div></div></div></div>
  </aside>
  <main class="wz-admin-main">
    <div class="wz-admin-topbar">
      <h1>All Rides</h1>
      <div style="display:flex;gap:var(--wz-space-3);">
        <select class="wz-input" style="width:auto;padding:var(--wz-space-2) var(--wz-space-3);font-size:var(--wz-text-sm);cursor:pointer;">
          <option>All Status</option>
          <option>Completed</option>
          <option>In Progress</option>
          <option>Cancelled</option>
        </select>
        <button class="wz-btn wz-btn-secondary" style="font-size:var(--wz-text-sm);" onclick="WZ_APP.showToast('Export coming soon','info')">📥 Export</button>
      </div>
    </div>

    <div style="display:flex;gap:var(--wz-space-4);margin-bottom:var(--wz-space-6);">
      <div class="wz-glass" style="flex:1;padding:var(--wz-space-4);border-radius:var(--wz-radius-lg);text-align:center;">
        <div style="font-size:var(--wz-text-2xl);font-weight:800;">284,500</div>
        <div style="font-size:var(--wz-text-xs);color:var(--wz-text-muted);">Total Rides</div>
      </div>
      <div class="wz-glass" style="flex:1;padding:var(--wz-space-4);border-radius:var(--wz-radius-lg);text-align:center;">
        <div style="font-size:var(--wz-text-2xl);font-weight:800;color:var(--wz-success);">89</div>
        <div style="font-size:var(--wz-text-xs);color:var(--wz-text-muted);">In Progress</div>
      </div>
      <div class="wz-glass" style="flex:1;padding:var(--wz-space-4);border-radius:var(--wz-radius-lg);text-align:center;">
        <div style="font-size:var(--wz-text-2xl);font-weight:800;">★ 4.82</div>
        <div style="font-size:var(--wz-text-xs);color:var(--wz-text-muted);">Avg Rating</div>
      </div>
    </div>

    <div class="wz-admin-card">
      <table class="wz-data-table">
        <thead><tr><th>ID</th><th>Rider</th><th>Driver</th><th>Route</th><th>Fare</th><th>Status</th><th>Date</th></tr></thead>
        <tbody id="rides-tbody"></tbody>
      </table>
    </div>
  </main>
</div>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script src="../js/admin.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => WZ_ADMIN.initRides());</script>
</body>
</html>

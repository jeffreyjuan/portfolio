<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Way'z — Admin Login</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .admin-login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--wz-bg-primary); }
    .admin-login-card { width:100%; max-width:400px; padding:var(--wz-space-8); }
    .admin-login-card .wz-logo { font-size:var(--wz-text-2xl); text-align:center; margin-bottom:var(--wz-space-2); }
    .shield { font-size:48px; text-align:center; margin-bottom:var(--wz-space-4); }
  </style>
</head>
<body>
<div class="admin-login-page">
  <div class="admin-login-card wz-glass anim-fade-in-up">
    <div class="shield">🛡️</div>
    <div class="wz-logo"><span>way'z</span></div>
    <p style="text-align:center;color:var(--wz-text-muted);font-size:var(--wz-text-sm);margin-bottom:var(--wz-space-6);">Admin Dashboard</p>
    <form onsubmit="handleAdminLogin(event)">
      <div class="wz-form-group">
        <label class="wz-input-label">Email</label>
        <input type="email" class="wz-input" placeholder="admin@wayz.lb" value="admin@wayz.lb" required>
      </div>
      <div class="wz-form-group">
        <label class="wz-input-label">Password</label>
        <input type="password" class="wz-input" placeholder="••••••••" value="admin123" required>
      </div>
      <button type="submit" class="wz-btn wz-btn-primary wz-btn-lg" style="width:100%;margin-top:var(--wz-space-2);">Sign In</button>
    </form>
    <p style="text-align:center;margin-top:var(--wz-space-4);font-size:var(--wz-text-xs);color:var(--wz-text-muted);">Authorized personnel only</p>
  </div>
</div>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
function handleAdminLogin(e) {
  e.preventDefault();
  WZ_APP.login('admin','admin1');
  setTimeout(() => window.location.href='dashboard.html', 500);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Way'z Driver — Ride Requests</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/driver.css">
</head>
<body>
<div class="wz-driver-app" style="overflow-y:auto;">
  <header class="wz-driver-header">
    <a href="../index.html" class="wz-logo"><span>way'z</span></a>
    <nav class="wz-driver-nav">
      <a href="dashboard.html">🗺️ <span class="wz-hide-mobile">Dashboard</span></a>
      <a href="rides.html" class="active">📋 <span class="wz-hide-mobile">Rides</span></a>
      <a href="earnings.html">💰 <span class="wz-hide-mobile">Earnings</span></a>
      <a href="profile.html">👤 <span class="wz-hide-mobile">Profile</span></a>
    </nav>
  </header>

  <main style="padding:var(--wz-space-6) var(--wz-space-4);max-width:800px;margin:0 auto;width:100%;">
    <h2 style="font-family:var(--wz-font-display);margin-bottom:var(--wz-space-2);">Ride History</h2>
    <p style="color:var(--wz-text-muted);font-size:var(--wz-text-sm);margin-bottom:var(--wz-space-6);">Your completed and cancelled trips</p>

    <!-- Stats Summary -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:var(--wz-space-3);margin-bottom:var(--wz-space-6);">
      <div class="wz-glass" style="padding:var(--wz-space-4);text-align:center;border-radius:var(--wz-radius-lg);">
        <div style="font-size:var(--wz-text-2xl);font-weight:800;">1,243</div>
        <div style="font-size:var(--wz-text-xs);color:var(--wz-text-muted);">Total Trips</div>
      </div>
      <div class="wz-glass" style="padding:var(--wz-space-4);text-align:center;border-radius:var(--wz-radius-lg);">
        <div style="font-size:var(--wz-text-2xl);font-weight:800;color:var(--wz-success);">94%</div>
        <div style="font-size:var(--wz-text-xs);color:var(--wz-text-muted);">Accept Rate</div>
      </div>
      <div class="wz-glass" style="padding:var(--wz-space-4);text-align:center;border-radius:var(--wz-radius-lg);">
        <div style="font-size:var(--wz-text-2xl);font-weight:800;">★ 4.9</div>
        <div style="font-size:var(--wz-text-xs);color:var(--wz-text-muted);">Rating</div>
      </div>
      <div class="wz-glass" style="padding:var(--wz-space-4);text-align:center;border-radius:var(--wz-radius-lg);">
        <div style="font-size:var(--wz-text-2xl);font-weight:800;">2%</div>
        <div style="font-size:var(--wz-text-xs);color:var(--wz-text-muted);">Cancel Rate</div>
      </div>
    </div>

    <!-- Ride List -->
    <div id="ride-list"></div>
  </main>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('ride-list');
  const rides = WZ_DATA.rideHistory;
  container.innerHTML = rides.map((ride, i) => {
    const from = WZ_DATA.getLocation(ride.from);
    const to = WZ_DATA.getLocation(ride.to);
    const date = new Date(ride.date);
    const rider = WZ_DATA.riders.find(r => r.id === ride.riderId);
    return `
      <div class="wz-trip-item anim-fade-in" style="animation-delay:${i*0.1}s;">
        <div style="min-width:50px;">
          <div style="font-weight:600;font-size:var(--wz-text-sm);">${date.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          <div style="font-size:var(--wz-text-xs);color:var(--wz-text-muted);">${date.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div style="flex:1;">
          <div style="font-size:var(--wz-text-sm);font-weight:500;">${from?from.name:'—'} → ${to?to.name:'—'}</div>
          <div style="font-size:var(--wz-text-xs);color:var(--wz-text-muted);">${rider?rider.name:'Rider'} · ${ride.distance} km · ${ride.duration} min · ${ride.type}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-weight:700;color:var(--wz-success);">+$${ride.fare.toFixed(2)}</div>
          ${ride.tip > 0 ? `<div style="font-size:var(--wz-text-xs);color:var(--wz-cyan);">+$${ride.tip.toFixed(2)} tip</div>` : ''}
        </div>
      </div>`;
  }).join('');
});
</script>
</body>
</html>

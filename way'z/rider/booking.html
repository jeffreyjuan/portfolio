<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Way'z — Book a Ride</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/rider.css">
  <style>
    #rider-map { width:100%; height:100%; }
    .dynamic-map-btns { display:flex; gap:var(--wz-space-2); margin-bottom:var(--wz-space-4); }
    .dynamic-map-btns .wz-btn { flex:1; font-size:var(--wz-text-xs); padding:var(--wz-space-2); }
  </style>
</head>
<body>
<div class="wz-rider-app">
  <header class="wz-rider-header">
    <a href="../index.html" class="wz-logo"><span>way'z</span></a>
    <nav class="wz-rider-nav">
      <a href="dashboard.html" class="active">🗺️ <span class="wz-hide-mobile">Book</span></a>
      <a href="history.html">🕐 <span class="wz-hide-mobile">History</span></a>
      <a href="profile.html">👤 <span class="wz-hide-mobile">Profile</span></a>
      <a href="settings.html">⚙️ <span class="wz-hide-mobile">Settings</span></a>
    </nav>
  </header>

  <div class="wz-map-area">
    <div id="rider-map"></div>

    <div class="wz-booking-panel" id="booking-panel">
      <div class="wz-booking-card">
        <h3 style="font-size:var(--wz-text-lg);margin-bottom:var(--wz-space-4);font-family:var(--wz-font-display);">Where exactly to?</h3>

        <div class="wz-location-inputs">
          <div class="wz-location-dot pickup"></div>
          <div class="wz-location-line"></div>
          <div class="wz-location-dot dest"></div>
          <input type="text" class="wz-input" id="pickup-input" placeholder="Search pickup address..." autocomplete="off">
          <input type="text" class="wz-input" id="dest-input" placeholder="Search destination address..." autocomplete="off">
        </div>

        <div class="dynamic-map-btns">
          <button class="wz-btn wz-btn-secondary" onclick="WZ_RIDER.useCurrentLocation()">📍 GPS Location</button>
          <button class="wz-btn wz-btn-secondary" onclick="WZ_RIDER.enableMapClick()">🗺️ Drop Pin</button>
        </div>

        <div class="wz-vehicle-selector">
          <div class="wz-vehicle-option selected" data-type="economy"><div class="icon">🚗</div><div class="name">Economy</div><div class="price" id="price-economy">—</div></div>
          <div class="wz-vehicle-option" data-type="comfort"><div class="icon">🚙</div><div class="name">Comfort</div><div class="price" id="price-comfort">—</div></div>
          <div class="wz-vehicle-option" data-type="premium"><div class="icon">✨</div><div class="name">Premium</div><div class="price" id="price-premium">—</div></div>
          <div class="wz-vehicle-option" data-type="xl"><div class="icon">🚐</div><div class="name">XL</div><div class="price" id="price-xl">—</div></div>
        </div>

        <div class="wz-fare-estimate">
          <div>
            <div class="label">Estimated fare</div>
            <div class="amount" id="fare-amount">—</div>
          </div>
          <div class="wz-fare-details">
            <span id="fare-distance">—</span>
            <span>·</span>
            <span id="fare-time">—</span>
          </div>
        </div>

        <button class="wz-btn wz-btn-primary wz-request-btn" id="request-ride-btn">Request Ride</button>
      </div>
    </div>

    <div class="wz-searching-overlay" id="searching-overlay" style="display:none;">
      <div class="wz-searching-ripple">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="center"></div>
      </div>
      <div class="wz-searching-text">Finding your driver...</div>
      <button class="wz-btn wz-btn-ghost" style="margin-top:var(--wz-space-4);" onclick="WZ_RIDER.cancelRide()">Cancel</button>
    </div>

    <div class="wz-driver-card wz-glass" id="driver-card" style="display:none;">
      <div class="wz-driver-info">
        <div class="wz-avatar wz-avatar-lg">HF</div>
        <div class="wz-driver-details" style="flex:1;">
          <h3 class="driver-name">Hassan Fawaz</h3>
          <div class="rating driver-rating">★ 4.9</div>
          <div class="wz-driver-vehicle driver-vehicle">Silver Toyota Corolla · B 123456</div>
        </div>
        <div class="wz-driver-eta">
          <div class="time">3</div>
          <div class="label">min away</div>
        </div>
      </div>
      <div class="wz-trip-progress">
        <div class="wz-trip-progress-bar"><div class="wz-trip-progress-fill" style="width:15%"></div></div>
        <div class="wz-trip-labels"><span>Driver en route</span><span>Pickup</span></div>
      </div>
      <div class="wz-driver-actions">
        <button class="wz-btn wz-btn-secondary" onclick="WZ_APP.showToast('Calling driver...','info')">📞 Call</button>
        <button class="wz-btn wz-btn-secondary" onclick="WZ_APP.showToast('Chat is ready in tracking','info')">💬 Message</button>
        <button class="wz-btn wz-btn-primary" onclick="window.location.href='tracking.html'">▶ Start Trip Demo</button>
      </div>
    </div>
  </div>
</div>

<script>
  const GOOGLE_MAPS_API_KEY = "YOUR_API_KEY_HERE";
  const WZ_GOOGLE_MAPS_LIBRARIES = "places";
  const wzGoogleMapsScript = document.createElement('script');
  wzGoogleMapsScript.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=${WZ_GOOGLE_MAPS_LIBRARIES}`;
  wzGoogleMapsScript.defer = true;
  document.head.appendChild(wzGoogleMapsScript);
</script>
<script src="../js/map.js"></script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script src="../js/rider.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  WZ_RIDER.initDashboard();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Way'z — Digital Wallet</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/rider.css">
  <style>
    /* Way'z Global Wallet Card */
    .wallet-card {
      background: var(--wz-gradient-primary);
      border-radius: var(--wz-radius-xl);
      padding: var(--wz-space-5);
      color: white;
      box-shadow: var(--wz-shadow-glow);
      position: relative;
      overflow: hidden;
      margin-bottom: var(--wz-space-6);
    }
    .wallet-card::after {
      content: 'W';
      position: absolute;
      right: -10px;
      bottom: -40px;
      font-size: 180px;
      font-weight: 900;
      opacity: 0.1;
      font-family: var(--wz-font-display);
    }
    
    /* Payment Provider Selection */
    .provider-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--wz-space-3); margin-bottom: var(--wz-space-4); }
    .provider-btn { 
      background: var(--wz-bg-tertiary); border: 2px solid var(--wz-border); 
      padding: var(--wz-space-3); border-radius: var(--wz-radius-lg); 
      font-weight: 700; cursor: pointer; transition: all 0.2s; 
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    /* Brand specific active states */
    .provider-btn[data-provider="whish"].active { border-color: #E3004F; background: rgba(227,0,79,0.1); color: #E3004F; }
    .provider-btn[data-provider="neo"].active { border-color: #5C2D91; background: rgba(92,45,145,0.1); color: #5C2D91; }
    .provider-btn[data-provider="suyool"].active { border-color: #FF5E00; background: rgba(255,94,0,0.1); color: #FF5E00; }
    .provider-btn[data-provider="omt"].active { border-color: #FACC15; background: rgba(250,204,21,0.1); color: #B45309; }

    .topup-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--wz-space-3); margin-bottom: var(--wz-space-4); }
    .topup-btn { background: var(--wz-bg-tertiary); border: 1px solid var(--wz-border); color: var(--wz-text-primary); padding: var(--wz-space-3); border-radius: var(--wz-radius-lg); font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .topup-btn.active { background: var(--wz-bg-active); border-color: var(--wz-primary); color: var(--wz-primary); }
    
    /* Dynamic Mock Gateway Overlay */
    .gateway-modal { background: white; color: #111; text-align: center; border-radius: var(--wz-radius-xl); padding: var(--wz-space-6); transition: all 0.3s ease; }
    .gateway-loader { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto var(--wz-space-4); }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wz-rider-app" style="display:flex;flex-direction:column;height:100vh;">
  
  <header class="wz-rider-header" style="position:static;">
    <a href="../index.html" class="wz-logo"><span>way'z</span></a>
    <nav class="wz-rider-nav">
      <a href="dashboard.html">🗺️ <span class="wz-hide-mobile">Book</span></a>
      <a href="history.html">🕐 <span class="wz-hide-mobile">History</span></a>
      <a href="wallet.html" class="active">💳 <span class="wz-hide-mobile">Wallet</span></a>
      <a href="profile.html">👤 <span class="wz-hide-mobile">Profile</span></a>
    </nav>
  </header>

  <main style="flex:1; overflow-y:auto; padding:var(--wz-space-5); max-width:600px; margin:0 auto; width:100%;">
    <h1 style="font-family:var(--wz-font-display); font-size:var(--wz-text-2xl); margin-bottom:var(--wz-space-4);">My Balance</h1>

    <div class="wallet-card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--wz-space-4);">
        <div style="font-weight:600; letter-spacing:1px; text-transform:uppercase; font-size:var(--wz-text-sm);">Way'z Pay</div>
        <div style="font-weight:800; font-size: 20px;">W</div>
      </div>
      <div style="font-size:var(--wz-text-sm); opacity:0.8;">Available Funds</div>
      <div style="font-family:var(--wz-font-display); font-size:42px; font-weight:800; margin-bottom:var(--wz-space-2);" id="wallet-balance">$0.00</div>
      <div style="font-size:var(--wz-text-xs); opacity:0.8;" id="wallet-phone">Account: +961 71 *** ***</div>
    </div>

    <div class="wz-card" style="padding:var(--wz-space-4); margin-bottom:var(--wz-space-6);">
      <h3 style="margin-bottom:var(--wz-space-3);">Add Funds</h3>
      
      <div style="font-size:var(--wz-text-sm); font-weight:600; margin-bottom:var(--wz-space-2); color:var(--wz-text-muted);">Select Provider</div>
      <div class="provider-grid">
        <button class="provider-btn active" data-provider="whish" onclick="selectProvider('whish', this)">🔴 Whish Money</button>
        <button class="provider-btn" data-provider="neo" onclick="selectProvider('neo', this)">🟣 Neo Pay</button>
        <button class="provider-btn" data-provider="suyool" onclick="selectProvider('suyool', this)">🟠 Suyool</button>
        <button class="provider-btn" data-provider="omt" onclick="selectProvider('omt', this)">🟡 OMT Pay</button>
      </div>

      <div style="font-size:var(--wz-text-sm); font-weight:600; margin-bottom:var(--wz-space-2); color:var(--wz-text-muted);">Select Amount</div>
      <div class="topup-grid">
        <button class="topup-btn" onclick="selectAmount(10, this)">$10</button>
        <button class="topup-btn active" onclick="selectAmount(20, this)">$20</button>
        <button class="topup-btn" onclick="selectAmount(50, this)">$50</button>
      </div>
      <div class="wz-form-group">
        <input type="number" id="custom-amount" class="wz-input" placeholder="Or enter custom amount ($)" oninput="clearSelection()">
      </div>
      
      <button class="wz-btn wz-btn-primary" id="action-btn" style="width:100%; background:#E3004F; color:white; border:none; font-weight:700; font-size:16px;" onclick="startTopup()">
        Top Up via Whish Money
      </button>
    </div>

    <h3 style="margin-bottom:var(--wz-space-3);">Recent Transactions</h3>
    <div id="tx-container" style="display:flex; flex-direction:column; gap:var(--wz-space-3);">
      </div>
  </main>
</div>

<div id="gateway-modal" class="wz-modal-overlay" style="z-index: 9999;">
  <div class="wz-modal gateway-modal" id="gateway-content">
    <div id="gateway-logo" style="font-weight:900; font-size:28px; margin-bottom:var(--wz-space-4);">Provider</div>
    <div class="gateway-loader" id="gateway-loader"></div>
    <h3 id="gateway-status" style="margin-bottom: var(--wz-space-2);">Connecting to App...</h3>
    <p style="color:#666; font-size:var(--wz-text-sm);" id="gateway-desc">Please confirm the request on your phone.</p>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
// Provider Configuration
const providers = {
  whish: { name: 'Whish Money', color: '#E3004F', style: 'italic' },
  neo: { name: 'Neo Pay', color: '#5C2D91', style: 'normal' },
  suyool: { name: 'Suyool', color: '#FF5E00', style: 'normal' },
  omt: { name: 'OMT Pay', color: '#FACC15', textCol: '#B45309', style: 'normal' }
};

let currentProvider = 'whish';
let selectedAmount = 20;
let rider = null;

document.addEventListener('DOMContentLoaded', () => {
  rider = WZ_DATA.riders[0];
  if (!rider.wallet) {
    rider.wallet = { balance: 0.00, transactions: [] };
    WZ_DATA.save();
  }
  document.getElementById('wallet-phone').textContent = `Account: ${rider.phone}`;
  updateUI();
});

function selectProvider(id, btn) {
  document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentProvider = id;
  
  const config = providers[id];
  const actionBtn = document.getElementById('action-btn');
  actionBtn.textContent = `Top Up via ${config.name}`;
  actionBtn.style.background = config.color;
  actionBtn.style.color = config.textCol || 'white';
}

function selectAmount(amt, btn) {
  document.querySelectorAll('.topup-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedAmount = amt;
  document.getElementById('custom-amount').value = '';
}

function clearSelection() {
  document.querySelectorAll('.topup-btn').forEach(b => b.classList.remove('active'));
  selectedAmount = parseFloat(document.getElementById('custom-amount').value) || 0;
}

function startTopup() {
  if (selectedAmount <= 0) {
    WZ_APP.showToast('Please enter a valid amount', 'warning');
    return;
  }

  const config = providers[currentProvider];
  
  // Setup Dynamic Gateway UI
  const modal = document.getElementById('gateway-modal');
  const logo = document.getElementById('gateway-logo');
  const status = document.getElementById('gateway-status');
  const desc = document.getElementById('gateway-desc');
  const loader = document.getElementById('gateway-loader');
  
  logo.textContent = config.name;
  logo.style.color = config.color;
  logo.style.fontStyle = config.style;
  
  loader.style.borderTopColor = config.color;
  loader.style.display = 'block';
  
  status.textContent = `Connecting to ${config.name}...`;
  status.style.color = '#111'; // Reset color
  desc.textContent = `Requesting $${selectedAmount.toFixed(2)} from ${rider.phone}`;
  
  // Show Modal
  modal.classList.add('active');

  // Simulate API Payment Delay
  setTimeout(() => {
    status.textContent = 'Payment Successful!';
    status.style.color = '#00C853'; // Success Green
    desc.textContent = 'Funds have been added to your Way\'z balance.';
    loader.style.display = 'none';
    
    // Add success checkmark temporarily
    const check = document.createElement('div');
    check.innerHTML = '✅';
    check.style.fontSize = '48px';
    check.style.marginBottom = 'var(--wz-space-4)';
    check.id = 'temp-check';
    loader.parentNode.insertBefore(check, status);

    // Update Database
    rider.wallet.balance += selectedAmount;
    rider.wallet.transactions.unshift({
      id: 'tx_' + Date.now(),
      type: 'topup',
      provider: config.name,
      title: `Top-Up via ${config.name}`,
      amount: selectedAmount,
      date: new Date().toISOString()
    });
    WZ_DATA.save();

    // Close and refresh
    setTimeout(() => {
      modal.classList.remove('active');
      const tempCheck = document.getElementById('temp-check');
      if(tempCheck) tempCheck.remove();
      
      updateUI();
      WZ_APP.showToast('Balance successfully updated!', 'success');
      
      // Reset amount input
      document.getElementById('custom-amount').value = '';
      selectAmount(20, document.querySelectorAll('.topup-btn')[1]);
    }, 2000);

  }, 2500);
}

function updateUI() {
  document.getElementById('wallet-balance').textContent = '$' + rider.wallet.balance.toFixed(2);
  
  const txContainer = document.getElementById('tx-container');
  if (rider.wallet.transactions.length === 0) {
    txContainer.innerHTML = '<div style="text-align:center; padding:var(--wz-space-4); color:var(--wz-text-muted);">No recent transactions</div>';
    return;
  }

  txContainer.innerHTML = rider.wallet.transactions.map(tx => {
    const isTopup = tx.type === 'topup';
    const sign = isTopup ? '+' : '-';
    const color = isTopup ? 'var(--wz-success)' : 'var(--wz-text-primary)';
    
    // Assign specific icons based on type
    let icon = '🚗';
    if (isTopup) {
      if(tx.provider === 'Whish Money') icon = '🔴';
      else if(tx.provider === 'Neo Pay') icon = '🟣';
      else if(tx.provider === 'Suyool') icon = '🟠';
      else if(tx.provider === 'OMT Pay') icon = '🟡';
      else icon = '📥';
    }

    const dateObj = new Date(tx.date);
    const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

    return `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:var(--wz-space-3); background:var(--wz-bg-secondary); border-radius:var(--wz-radius-lg);">
        <div style="display:flex; align-items:center; gap:var(--wz-space-3);">
          <div style="width:40px; height:40px; border-radius:50%; background:var(--wz-bg-tertiary); display:flex; align-items:center; justify-content:center; font-size:20px;">${icon}</div>
          <div>
            <div style="font-weight:600; font-size:var(--wz-text-sm);">${tx.title}</div>
            <div style="font-size:var(--wz-text-xs); color:var(--wz-text-muted);">${dateStr}</div>
          </div>
        </div>
        <div style="font-weight:800; font-family:var(--wz-font-display); color:${color};">
          ${sign}$${tx.amount.toFixed(2)}
        </div>
      </div>
    `;
  }).join('');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Way'z — Sign In</title>
  <meta name="description" content="Sign in or create your Way'z account to book rides across Lebanon.">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/rider.css">
</head>
<body>
<div class="wz-auth-page">
  <!-- Left Visual -->
  <div class="wz-auth-visual">
    <div class="wz-auth-visual-content anim-fade-in">
      <span class="wz-auth-car-icon">🚗</span>
      <h2>Go anywhere with <span class="wz-text-gradient">Way'z</span></h2>
      <p>Safe, fast, and affordable rides across all of Lebanon. Book in seconds.</p>
    </div>
  </div>

  <!-- Right Form -->
  <div class="wz-auth-form-side">
    <div class="wz-auth-form-container anim-fade-in-up">
      <div class="wz-logo"><span>way'z</span></div>
      <p class="subtitle">Welcome back! Sign in to continue.</p>

      <!-- Tabs -->
      <div class="wz-auth-tabs">
        <div class="wz-auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</div>
        <div class="wz-auth-tab" data-tab="signup" onclick="switchTab('signup')">Sign Up</div>
      </div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="wz-form-group">
          <label class="wz-input-label">Phone Number</label>
          <div class="wz-phone-input">
            <div class="wz-phone-prefix">🇱🇧 +961</div>
            <input type="tel" class="wz-input" placeholder="71 123 456" id="login-phone" required>
          </div>
        </div>
        <div class="wz-form-group">
          <label class="wz-input-label">Password</label>
          <input type="password" class="wz-input" placeholder="Enter your password" id="login-password" required>
        </div>
        <button type="submit" class="wz-btn wz-btn-primary wz-btn-lg" style="width:100%;margin-top:var(--wz-space-2);">Sign In</button>
      </form>

      <!-- Signup Form (hidden) -->
      <form id="signup-form" style="display:none;" onsubmit="handleSignup(event)">
        <div class="wz-form-group">
          <label class="wz-input-label">Full Name</label>
          <input type="text" class="wz-input" placeholder="Karim Haddad" required>
        </div>
        <div class="wz-form-group">
          <label class="wz-input-label">Phone Number</label>
          <div class="wz-phone-input">
            <div class="wz-phone-prefix">🇱🇧 +961</div>
            <input type="tel" class="wz-input" placeholder="71 123 456" required>
          </div>
        </div>
        <div class="wz-form-group">
          <label class="wz-input-label">Email</label>
          <input type="email" class="wz-input" placeholder="karim@example.com" required>
        </div>
        <div class="wz-form-group">
          <label class="wz-input-label">Password</label>
          <input type="password" class="wz-input" placeholder="Create a password" required>
        </div>
        <button type="submit" class="wz-btn wz-btn-primary wz-btn-lg" style="width:100%;margin-top:var(--wz-space-2);">Create Account</button>
      </form>

      <!-- Social Login -->
      <div class="wz-social-divider">or continue with</div>
      <div class="wz-social-buttons">
        <button class="wz-social-btn" onclick="socialLogin('google')">🔵 Google</button>
        <button class="wz-social-btn" onclick="socialLogin('apple')">🍎 Apple</button>
        <button class="wz-social-btn" onclick="socialLogin('facebook')">📘 Facebook</button>
      </div>

      <p style="text-align:center;margin-top:var(--wz-space-6);font-size:var(--wz-text-xs);color:var(--wz-text-muted);">
        Want to drive? <a href="../driver/login.html">Sign up as a driver</a>
      </p>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.wz-auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
}
function handleLogin(e) {
  e.preventDefault();
  WZ_APP.login('rider', 'r1');
  setTimeout(() => window.location.href = 'dashboard.html', 500);
}
function handleSignup(e) {
  e.preventDefault();
  WZ_APP.login('rider', 'r1');
  WZ_APP.showToast('Account created successfully!', 'success');
  setTimeout(() => window.location.href = 'dashboard.html', 800);
}
function socialLogin(provider) {
  WZ_APP.login('rider', 'r1');
  WZ_APP.showToast('Signed in with ' + provider, 'success');
  setTimeout(() => window.location.href = 'dashboard.html', 500);
}
</script>
</body>
</html>
